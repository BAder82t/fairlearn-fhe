name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs,signing]"
      - name: Ruff
        run: python -m ruff check .
      - name: Pytest
        run: python -m pytest tests/ --cov=fairlearn_fhe --cov-report=term-missing
      - name: Docs
        if: matrix.python == '3.12'
        run: python -m mkdocs build --strict
      - name: Package
        if: matrix.python == '3.12'
        run: |
          python -m build
          python -m twine check dist/*
